name: Deploy NodeJS code on Excloud - v1 - Traditional

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4 # code ka access milega

            - name: Deploy on ExCloud
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: 210.79.129.245 # your ip
                  username: ubuntu
                  key: ${{ secrets.PRIVATE_KEY }} # from github lelo
                  script: |
                      export NVM_DIR="$HOME/.nvm"
                      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
                      cd /home/ubuntu/cicd-deployment
                      git pull
                      npm install
                      pm2 restart 0
