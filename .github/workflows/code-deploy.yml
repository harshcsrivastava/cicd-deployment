name: Deploy NodeJS code on Excloud - v1 - Traditional

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4 # code ka access milega

            - name: Deploy on Excloud
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: 210.79.129.235 # your ip
                  username: ubuntu
                  key: ${{ secrets.PRIVATE_KEY }}
                  script: |
                      cd /home/ubuntu/cicd-deployment
                      git pull
                      npm install  
                      pm2 restart 0
